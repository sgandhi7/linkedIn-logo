<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Sign up or sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    /* ===== Layout / Branding ===== */

    html, body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #fff;
    }

    img[data-tenant-branding-background=true] {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      padding-top: 6vh;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.12);
      padding: 40px 32px;
      width: 420px;
      max-width: 92%;
    }

    .companyLogo {
      display: block;
      margin: 0 auto 20px auto;
      max-height: 90px;
    }

    /* ===== Provider Buttons ===== */

    button.accountButton.claims-provider-selection {
      position: relative;
      width: 100%;
      height: 48px;
      line-height: 48px;
      margin: 10px 0;
      padding-left: 60px;
      text-align: left;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background-color: #fff;
      cursor: pointer;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    button.accountButton.claims-provider-selection:hover {
      background-color: #1662c7;
      color: white;
    }

    /* ===== ICON BASE ===== */

    button.accountButton.claims-provider-selection::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      background-size: contain;
      background-repeat: no-repeat;
    }

    /* ===== LinkedIn Icon ===== */

    button#LinkedIn::before {
      background-image: url("data:image/svg+xml;utf8,\
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 448 512'>\
      <path fill='%230A66C2' d='M100.28 448H7.4V148.9h92.88zM53.79 108.1C24.09 108.1 0 83.6 0 53.6 0 23.1 24.7 0 54.5 0s53.8 23.1 53.8 53.6c0 30-24.1 54.5-54.5 54.5zM447.9 448h-92.7V302.4c0-34.7-.7-79.2-48.3-79.2-48.3 0-55.7 37.8-55.7 76.8V448h-92.8V148.9h89.1v40.8h1.3c12.4-23.6 42.7-48.3 87.9-48.3 94 0 111.4 61.9 111.4 142.3V448z'/>\
      </svg>");
    }

    /* ===== Google Icon ===== */

    button#GoogleExchange::before {
      background-image: url("data:image/svg+xml;utf8,\
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 533.5 544.3'>\
      <path fill='%234285F4' d='M533.5 278.4c0-17.5-1.6-34.4-4.6-50.8H272v96.2h147.1c-6.4 34.6-25 63.9-53 83.4v69.4h85.6c50.1-46.1 79.8-114 79.8-198.2z'/>\
      <path fill='%2334A853' d='M272 544.3c72.6 0 133.6-24 178.2-65.5l-85.6-69.4c-23.9 16.1-54.5 25.6-92.6 25.6-71 0-131.2-47.9-152.7-112.5H34.7v70.7C79.6 491.6 169.6 544.3 272 544.3z'/>\
      <path fill='%23FBBC04' d='M119.3 323.1c-10.6-31.6-10.6-65.7 0-97.3V155.1H34.7C12.3 199.7 0 244.5 0 278.4s12.3 78.7 34.7 123.3l84.6-78.6z'/>\
      <path fill='%23EA4335' d='M272 107.1c39.6 0 75.2 13.6 103.1 40.4l77.3-77.3C405.3 24.5 346.6 0 272 0 169.6 0 79.6 52.7 34.7 131.1l84.6 70.6C140.8 155 201 107.1 272 107.1z'/>\
      </svg>");
    }

    /* ===== Microsoft Icon ===== */

    button#MicrosoftAccountExchange::before {
      background-image: url("data:image/svg+xml;utf8,\
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 448 512'>\
      <rect width='50%' height='50%' x='0' y='0' fill='%23F35325'/>\
      <rect width='50%' height='50%' x='50%' y='0' fill='%2381BC06'/>\
      <rect width='50%' height='50%' x='0' y='50%' fill='%2305A6F0'/>\
      <rect width='50%' height='50%' x='50%' y='50%' fill='%23FFBA08'/>\
      </svg>");
    }

  </style>
</head>

<body>

  <div id="background_branding_container" data-tenant-branding-background-color="true">
    <img data-tenant-branding-background="true"
         src="https://login.microsoftonline.com/templates/src/backgrounds/1-1.png"
         alt="Background" />
  </div>

  <div class="container">
    <div class="panel">
      <img class="companyLogo"
           data-tenant-branding-logo="true"
           src="https://login.microsoftonline.com/templates/src/images/logo.svg"
           alt="Company Logo" />

      <div id="api"></div>
    </div>
  </div>

</body>
</html>
