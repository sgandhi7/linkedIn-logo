<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Sign up or sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    /* Keep existing background/branding hooks so portal branding still works */
    html,body{height:100%;margin:0;font-family:"Segoe UI",SegoeUI,Arial,sans-serif;background:#fff}
    img[data-tenant-branding-background=true]{width:100%;height:100%;object-fit:cover;position:fixed;left:0;top:0;z-index:0}
    .container{position:relative;z-index:2;display:flex;align-items:flex-start;justify-content:center;height:100vh;padding-top:6vh}
    .panel{background:#fff;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.08);padding:36px 28px;width:420px;max-width:92%}
    .companyLogo{display:block;margin:0 auto 18px auto;max-height:90px}

    /* ------------- TARGETED IDP BUTTON RULES ------------- */
    /* These selectors match the runtime markup you showed in DevTools */
    button.accountButton.claims-provider-selection#LinkedIn,
    button.accountButton.claims-provider-selection#GoogleExchange,
    button.accountButton.claims-provider-selection#MicrosoftAccountExchange {
      /* layout - match builtin .accountButton visual */
      display: block !important;
      width: 100% !important;
      max-width: 380px !important;
      height: 48px !important;
      line-height: 48px !important;
      margin: 10px auto !important;
      border-radius: 6px !important;
      border: 1px solid #e0e0e0 !important;
      background-color: #ffffff !important;
      font-size: 16px !important;
      text-align: left !important;
      padding-left: 55px !important; /* room for icon */
      box-sizing: border-box !important;
      background-repeat: no-repeat !important;
      background-position: 15px center !important;
      background-size: 20px 20px !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06) !important;
      color: #333 !important;
      cursor: pointer !important;
    }

    /* Specific icons (colored) for each provider - using Microsoft-hosted icon assets */
    button.accountButton.claims-provider-selection#LinkedIn {
      background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/linkedin.svg') !important;
    }
    button.accountButton.claims-provider-selection#GoogleExchange {
      background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/google.svg') !important;
    }
    button.accountButton.claims-provider-selection#MicrosoftAccountExchange {
      background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/microsoft.svg') !important;
    }

    /* Hover: change background and (optionally) swap to white icons where available */
    button.accountButton.claims-provider-selection#LinkedIn:hover {
      background-color: #0274b3 !important;
      color: #fff !important;
      background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/linkedin.svg') !important;
    }
    button.accountButton.claims-provider-selection#GoogleExchange:hover {
      background-color: #c64a29 !important;
      color: #fff !important;
      background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/google.svg') !important;
    }
    button.accountButton.claims-provider-selection#MicrosoftAccountExchange:hover {
      background-color: #01a4ef !important;
      color: #fff !important;
      background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/microsoft.svg') !important;
    }

    /* Small-screen adjustments */
    @media (max-width:480px) {
      button.accountButton.claims-provider-selection#LinkedIn,
      button.accountButton.claims-provider-selection#GoogleExchange,
      button.accountButton.claims-provider-selection#MicrosoftAccountExchange {
        height: 42px !important;
        line-height: 42px !important;
        padding-left: 50px !important;
        max-width: 320px !important;
      }
    }
  </style>
</head>

<body>
  <!-- Background image / tenant branding hook -->
  <div id="background_branding_container" data-tenant-branding-background-color="true">
    <img data-tenant-branding-background="true"
         src="https://login.microsoftonline.com/templates/src/backgrounds/1-1.png"
         alt="Background" />
  </div>

  <div class="container">
    <div class="panel">
      <!-- Company logo at top (portal still controls this if you keep the data-tenant-branding-logo attribute) -->
      <img class="companyLogo" data-tenant-branding-logo="true"
           src="https://login.microsoftonline.com/templates/src/images/logo.svg"
           alt="Company Logo" />

      <!-- REQUIRED: Azure injects the login UI here -->
      <div id="api" role="main"></div>
    </div>
  </div>
</body>
</html>
