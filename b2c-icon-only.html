<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Sign up or sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    /* Basic page look: keep your background & logo functionality */
    html,body{height:100%;margin:0;font-family:"Segoe UI",SegoeUI,Arial,sans-serif;background:#fff}
    img[data-tenant-branding-background=true]{width:100%;height:100%;object-fit:cover;position:fixed;left:0;top:0;z-index:0}
    .container{position:relative;z-index:2;display:flex;align-items:flex-start;justify-content:center;height:100vh;padding-top:6vh}
    .panel{background:#fff;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.08);padding:36px 28px;width:420px;max-width:92%}
    .companyLogo{display:block;margin:0 auto 18px auto;max-height:90px}

    /* Default account button look (used as fallback if script can't find a target) */
    .accountButtonFallback{
      display:block;width:100%;height:48px;line-height:48px;margin:10px auto;border-radius:6px;
      border:1px solid #e0e0e0;background:#fff;text-align:left;padding-left:50px;font-size:16px;box-sizing:border-box;
      background-repeat:no-repeat;background-position:15px center;background-size:20px 20px;
      transition:background-color .15s,color .15s;
    }
  </style>
</head>
<body>
  <!-- Background / tenant branding hook -->
  <div id="background_branding_container" data-tenant-branding-background-color="true">
    <img data-tenant-branding-background="true" src="https://login.microsoftonline.com/templates/src/backgrounds/1-1.png" alt="Background"/>
  </div>

  <div class="container">
    <div class="panel">
      <!-- Company logo; keep data-tenant-branding-logo so portal branding still works -->
      <img class="companyLogo" data-tenant-branding-logo="true" src="https://login.microsoftonline.com/templates/src/images/logo.svg" alt="Company Logo" />

      <!-- REQUIRED: Azure injects the login UI here -->
      <div id="api" role="main"></div>
    </div>
  </div>

  <!-- Runtime script: robustly finds the provider buttons and injects icons -->
  <script>
    (function () {
      // Icon URLs (colored / white). Replace with your CDN if desired.
      const ICONS = {
        google: {
          color: 'https://login.microsoftonline.com/templates/src/idp_logos/colored/google.svg',
          white: 'https://login.microsoftonline.com/templates/src/idp_logos/white/google.svg'
        },
        microsoft: {
          color: 'https://login.microsoftonline.com/templates/src/idp_logos/colored/microsoft.svg',
          white: 'https://login.microsoftonline.com/templates/src/idp_logos/white/microsoft.svg'
        },
        linkedin: {
          color: 'https://login.microsoftonline.com/templates/src/idp_logos/colored/linkedin.svg',
          white: 'https://login.microsoftonline.com/templates/src/idp_logos/white/linkedin.svg'
        }
      };

      // Utility: normalize text
      function textOf(el) {
        if (!el) return '';
        return (el.innerText || el.textContent || '').trim().toLowerCase();
      }

      // Apply icon styles to a button element
      function styleButtonWithIcon(btn, providerKey) {
        if (!btn || !providerKey || !ICONS[providerKey]) return;

        // Inline base styles to ensure icons show regardless of template class differences
        btn.style.backgroundImage = 'url("' + ICONS[providerKey].color + '")';
        btn.style.backgroundRepeat = 'no-repeat';
        btn.style.backgroundPosition = '15px center';
        btn.style.backgroundSize = '20px 20px';
        // Ensure padding / width so text doesn't overlap
        btn.style.paddingLeft = '50px';
        btn.style.textAlign = 'left';
        btn.style.display = 'block';
        btn.style.width = '100%';
        btn.style.boxSizing = 'border-box';
        btn.style.height = btn.style.height || '48px';
        btn.style.lineHeight = btn.style.lineHeight || '48px';
        btn.style.borderRadius = btn.style.borderRadius || '6px';
        btn.style.border = btn.style.border || '1px solid #e0e0e0';
        btn.style.backgroundColor = btn.style.backgroundColor || '#ffffff';

        // Add hover behavior to swap to white icon and change background color (like built-in)
        function onEnter() {
          btn.style.backgroundImage = 'url("' + ICONS[providerKey].white + '")';
          // Only change text color if it doesn't already invert on hover
          btn.style.color = '#ffffff';
          btn.style.backgroundColor = '#1662c7';
        }
        function onLeave() {
          btn.style.backgroundImage = 'url("' + ICONS[providerKey].color + '")';
          btn.style.color = ''; // reset
          btn.style.backgroundColor = '#ffffff';
        }

        // Remove previous listeners to avoid duplication
        btn.removeEventListener('mouseenter', btn._iconMouseEnter);
        btn.removeEventListener('mouseleave', btn._iconMouseLeave);

        btn._iconMouseEnter = onEnter;
        btn._iconMouseLeave = onLeave;

        btn.addEventListener('mouseenter', btn._iconMouseEnter);
        btn.addEventListener('mouseleave', btn._iconMouseLeave);
      }

      // Find candidate elements inside #api that look like provider buttons
      function findAndPatchIdpButtons() {
        const api = document.getElementById('api');
        if (!api) return false;

        // Candidate selectors: many B2C templates use button, a.accountButton, .accountButton, .options .accountButton
        const candidates = Array.from(api.querySelectorAll('button, a, .accountButton, input[type=button], [role="button"]'));

        let patched = 0;

        candidates.forEach(el => {
          const t = textOf(el);

          if (!t) return;
          // match substrings - adjust if your provider display text differs
          if (t.includes('google')) {
            styleButtonWithIcon(el, 'google');
            patched++;
          } else if (t.includes('microsoft') || t.includes('microsoft account')) {
            styleButtonWithIcon(el, 'microsoft');
            patched++;
          } else if (t.includes('linkedin')) {
            styleButtonWithIcon(el, 'linkedin');
            patched++;
          }
        });

        // If nothing matched, try a looser approach: look for elements with known ids or data attributes
        if (patched === 0) {
          // common id patterns
          const idChecks = [
            {sel:'#GoogleExchange', key:'google'},
            {sel:'#MicrosoftAccountExchange', key:'microsoft'},
            {sel:'#LinkedInExchange', key:'linkedin'},
            {sel:'button[id*="Google"]', key:'google'},
            {sel:'button[id*="Microsoft"]', key:'microsoft'},
            {sel:'button[id*="LinkedIn"]', key:'linkedin'},
            {sel:'.accountButton[id*="Google"]', key:'google'},
            {sel:'.accountButton[id*="Microsoft"]', key:'microsoft'},
            {sel:'.accountButton[id*="LinkedIn"]', key:'linkedin'}
          ];
          idChecks.forEach(check => {
            const el = api.querySelector(check.sel);
            if (el) {
              styleButtonWithIcon(el, check.key);
              patched++;
            }
          });
        }

        return patched > 0;
      }

      // Wait for UI to appear and patch; we try multiple times because B2C injects asynchronously
      function waitForApiAndPatch(retries = 20, interval = 300) {
        let attempts = 0;
        const id = setInterval(() => {
          attempts++;
          const api = document.getElementById('api');
          if (api) {
            const ok = findAndPatchIdpButtons();
            // if we found and patched some buttons, we can stop early
            if (ok || attempts >= retries) {
              clearInterval(id);
            }
          } else if (attempts >= retries) {
            clearInterval(id);
          }
        }, interval);
      }

      // Run on DOM ready
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        waitForApiAndPatch();
      } else {
        document.addEventListener('DOMContentLoaded', function () {
          waitForApiAndPatch();
        });
      }

      // Extra safety: also run a mutation observer on #api to catch late insertions
      (function observeApi() {
        const root = document.getElementById('api');
        if (!root) {
          // try again shortly
          setTimeout(observeApi, 500);
          return;
        }
        const mo = new MutationObserver(() => { findAndPatchIdpButtons(); });
        mo.observe(root, { childList: true, subtree: true });
      })();

    })();
  </script>

</body>
</html>
