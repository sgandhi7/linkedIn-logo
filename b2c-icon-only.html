<!DOCTYPE html>
<html>
<head>
    <title>Sign up or sign in</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <style id="common">
        @font-face {
            font-family: 'SegoeUI';
            src: url(https://login.microsoftonline.com/templates/src/fonts/segoeui.WOFF);
            font-weight: normal;
        }
        @font-face {
            font-family: 'SegoeUI';
            src: url(https://login.microsoftonline.com/templates/src/fonts/segoeui_bold.WOFF);
            font-weight: bold;
        }

        /* ICON IMAGES (colored by default, white on hover) */
        /* explicit images for IdPs */
        #GoogleExchange,
        button[id*="Google"],
        .accountButton[id*="Google"],
        .options #GoogleExchange,
        .options button[id*="Google"] {
          background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/google.svg') !important;
        }
        #GoogleExchange:hover,
        button[id*="Google"]:hover,
        .accountButton[id*="Google"]:hover {
          background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/google.svg') !important;
        }

        #MicrosoftAccountExchange,
        button[id*="Microsoft"],
        .accountButton[id*="Microsoft"],
        .options #MicrosoftAccountExchange,
        .options button[id*="Microsoft"] {
          background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/microsoft.svg') !important;
        }
        #MicrosoftAccountExchange:hover,
        button[id*="Microsoft"]:hover,
        .accountButton[id*="Microsoft"]:hover {
          background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/microsoft.svg') !important;
        }

        #LinkedInExchange,
        button[id*="LinkedIn"],
        .accountButton[id*="LinkedIn"],
        .options #LinkedInExchange,
        .options button[id*="LinkedIn"] {
          background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/linkedin.svg') !important;
        }
        #LinkedInExchange:hover,
        button[id*="LinkedIn"]:hover,
        .accountButton[id*="LinkedIn"]:hover {
          background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/linkedin.svg') !important;
        }

        /* Generic styling so the icon appears to the left and text lines up */
        #GoogleExchange, #MicrosoftAccountExchange, #LinkedInExchange,
        button[id*="Google"], button[id*="Microsoft"], button[id*="LinkedIn"],
        .accountButton[id*="Google"], .accountButton[id*="Microsoft"], .accountButton[id*="LinkedIn"],
        .options #GoogleExchange, .options #MicrosoftAccountExchange, .options #LinkedInExchange {
          background-repeat: no-repeat !important;
          background-position: 12px center !important;
          background-size: 18px 18px !important;
          padding-left: 45px !important; /* give space so text doesn't overlap icon */
        }

        /* Normalize other IdP icons to align visually */
        #FacebookExchange, #GitHubExchange, #AppleExchange, #TwitterExchange, #AmazonExchange {
          background-repeat: no-repeat;
          background-position: 12px center;
          background-size: 18px 18px;
          padding-left: 45px;
        }

        .buttons #cancel:before {
            content: url(https://login.microsoftonline.com/templates/src/images/left-arrow.svg);
        }
    </style>

    <!-- keep other IDP local selector definitions -->
    <style id="idpselector">
        #SignInWithLogonNameExchange, #SignUpWithLogonEmailExchange, #SignUpWithLogonNameExchange {
            background-image: url(https://login.microsoftonline.com/templates/src/idp_logos/colored/local.svg);
        }
        #SignInWithLogonNameExchange:hover, #SignUpWithLogonEmailExchange:hover, #SignUpWithLogonNameExchange:hover {
            background-image: url(https://login.microsoftonline.com/templates/src/idp_logos/white/local.svg);
        }
        #SignUpWithLogonEmailExchange.text-link {
            background-image: none;
            background-color: transparent !important;
        }
        #SignUpWithLogonEmailExchange.text-link:hover {
            background-image: none;
            background-color: transparent !important;
        }
    </style>

<body>
    <!-- Background image / color container.
         Keep these attributes to allow the portal to update them from Tenant Branding if you want. -->
    <div id="background_branding_container" data-tenant-branding-background-color="true">
      <img data-tenant-branding-background="true" src="https://login.microsoftonline.com/templates/src/backgrounds/1-1.png" alt="Illustration"/>
    </div>

    <div class="container  unified_container " role="presentation">
        <div class="row">
            <div class="col-lg-6">
                <div class="panel panel-default">
                    <div class="panel-body">
                        <!-- Company logo at top. Keep data-tenant-branding-logo attribute so Azure branding updates still apply -->
                        <img class="companyLogo" data-tenant-branding-logo="true" src="https://login.microsoftonline.com/templates/src/images/logo.svg" alt="Company Logo">

                        <!-- DO NOT REMOVE: Azure injects the login UI into this element -->
                        <div id="api" role="main"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
