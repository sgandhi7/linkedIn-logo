<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Sign up or sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    /* Page / branding hooks (keep the data-tenant attributes so portal branding still works) */
    html,body{height:100%;margin:0;font-family:"Segoe UI",SegoeUI,Arial,sans-serif;background:#fff}
    img[data-tenant-branding-background=true]{width:100%;height:100%;object-fit:cover;position:fixed;left:0;top:0;z-index:0}
    .container{position:relative;z-index:2;display:flex;align-items:flex-start;justify-content:center;height:100vh;padding-top:6vh}
    .panel{background:#fff;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.08);padding:36px 28px;width:420px;max-width:92%}
    .companyLogo{display:block;margin:0 auto 18px auto;max-height:90px}

    /* Make sure the injected inline SVGs line up at left of button text */
    button.accountButton.claims-provider-selection {
      position: relative;            /* so absolute-positioned svg can sit inside */
      text-align: left;
      padding-left: 60px;            /* room for icon */
      box-sizing: border-box;
      min-height: 48px;
      line-height: 48px;
      font-size: 16px;
      border-radius: 6px;
    }

    /* wrapper for the injected SVG so we can position & size it consistently */
    .idp-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      pointer-events: none; /* icon shouldn't intercept clicks */
      display: inline-block;
      vertical-align: middle;
    }

    /* optional: small visual tweaks on focus/hover to match existing behavior */
    button.accountButton.claims-provider-selection:hover { color: #fff; }
    button.accountButton.claims-provider-selection:focus { outline: none; box-shadow: 0 0 0 3px rgba(21,156,228,0.15); }

    /* Hover background colors per provider - kept to preserve the feel */
    button#LinkedIn:hover { background-color: #0274b3 !important; }
    button#GoogleExchange:hover { background-color: #c64a29 !important; }
    button#MicrosoftAccountExchange:hover { background-color: #01a4ef !important; }

    /* When button background becomes dark on hover, invert the svg colors by switching classes */
    button#LinkedIn.hover-invert .idp-icon svg { filter: invert(1) brightness(2); }
    button#GoogleExchange.hover-invert .idp-icon svg { filter: invert(1) brightness(2); }
    button#MicrosoftAccountExchange.hover-invert .idp-icon svg { filter: invert(1) brightness(2); }

    @media (max-width:480px) {
      .idp-icon { width:18px; height:18px; left:12px; }
      button.accountButton.claims-provider-selection { padding-left:48px; min-height:42px; line-height:42px; }
    }
  </style>
</head>

<body>
  <!-- Background image / tenant branding hook -->
  <div id="background_branding_container" data-tenant-branding-background-color="true">
    <img data-tenant-branding-background="true"
         src="https://login.microsoftonline.com/templates/src/backgrounds/1-1.png"
         alt="Background" />
  </div>

  <div class="container">
    <div class="panel">
      <img class="companyLogo" data-tenant-branding-logo="true"
           src="https://login.microsoftonline.com/templates/src/images/logo.svg"
           alt="Company Logo" />

      <!-- REQUIRED: Azure injects the login UI here -->
      <div id="api" role="main"></div>
    </div>
  </div>

  <!-- SCRIPT: injects inline SVG icons into the runtime provider buttons (no external image loads) -->
  <script>
    (function () {
      // Inline SVGs (small, self-contained). You can replace these strings with alternate SVG markup.
      const SVGs = {
        linkedin: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" aria-hidden="true"><rect width="100%" height="100%" fill="none"/><path fill="#0A66C2" d="M100.28 448H7.4V148.9h92.88zM53.79 108.1C24.09 108.1 0 83.6 0 53.6 0 23.1 24.7 0 54.5 0s53.8 23.1 53.8 53.6c0 30-24.1 54.5-54.5 54.5zM447.9 448h-92.7V302.4c0-34.7-.7-79.2-48.3-79.2-48.3 0-55.7 37.8-55.7 76.8V448h-92.8V148.9h89.1v40.8h1.3c12.4-23.6 42.7-48.3 87.9-48.3 94 0 111.4 61.9 111.4 142.3V448z"/></svg>',
        microsoft: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" aria-hidden="true"><rect width="50%" height="50%" x="0" y="0" fill="#f35325"/><rect width="50%" height="50%" x="50%" y="0" fill="#81bc06"/><rect width="50%" height="50%" x="0" y="50%" fill="#05a6f0"/><rect width="50%" height="50%" x="50%" y="50%" fill="#ffba08"/></svg>',
        google: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 533.5 544.3" aria-hidden="true"><path fill="#4285f4" d="M533.5 278.4c0-17.5-1.6-34.4-4.6-50.8H272v96.2h147.1c-6.4 34.6-25 63.9-53 83.4v69.4h85.6c50.1-46.1 79.8-114 79.8-198.2z"/><path fill="#34a853" d="M272 544.3c72.6 0 133.6-24 178.2-65.5l-85.6-69.4c-23.9 16.1-54.5 25.6-92.6 25.6-71 0-131.2-47.9-152.7-112.5H34.7v70.7C79.6 491.6 169.6 544.3 272 544.3z"/><path fill="#fbbc04" d="M119.3 323.1c-10.6-31.6-10.6-65.7 0-97.3V155.1H34.7C12.3 199.7 0 244.5 0 278.4s12.3 78.7 34.7 123.3l84.6-78.6z"/><path fill="#ea4335" d="M272 107.1c39.6 0 75.2 13.6 103.1 40.4l77.3-77.3C405.3 24.5 346.6 0 272 0 169.6 0 79.6 52.7 34.7 131.1l84.6 70.6C140.8 155 201 107.1 272 107.1z"/></svg>'
      };

      // helper: create icon wrapper with inline svg
      function makeIconHtml(svgString) {
        const wrapper = document.createElement('span');
        wrapper.className = 'idp-icon';
        wrapper.innerHTML = svgString;
        return wrapper;
      }

      // style adjustments to ensure button remains visually similar to B2C defaults
      const baseBtnStyle = {
        display: 'block',
        width: '100%',
        maxWidth: '380px',
        margin: '10px auto',
        paddingLeft: null // let CSS handle
      };

      // Find runtime buttons inside #api and insert icons
      function patchButtons() {
        const api = document.getElementById('api');
        if (!api) return false;

        // exact runtime selectors you showed
        const linkedinBtn = api.querySelector('button.accountButton.claims-provider-selection#LinkedIn');
        const googleBtn = api.querySelector('button.accountButton.claims-provider-selection#GoogleExchange');
        const msBtn = api.querySelector('button.accountButton.claims-provider-selection#MicrosoftAccountExchange');

        const list = [
          {el: linkedinBtn, svg: SVGs.linkedin, key: 'linkedin'},
          {el: googleBtn, svg: SVGs.google, key: 'google'},
          {el: msBtn, svg: SVGs.microsoft, key: 'microsoft'}
        ];

        let patched = 0;
        list.forEach(item => {
          if (item.el && !item.el.querySelector('.idp-icon')) {
            // insert inline SVG wrapper as first child
            const icon = makeIconHtml(item.svg);
            item.el.insertBefore(icon, item.el.firstChild);

            // ensure hover class toggles to invert icon if background darkens
            item.el.addEventListener('mouseenter', function () {
              item.el.classList.add('hover-invert');
            });
            item.el.addEventListener('mouseleave', function () {
              item.el.classList.remove('hover-invert');
            });

            patched++;
          }
        });

        return patched > 0;
      }

      // Because B2C injects asynchronously, poll until patched or until timeout
      function waitAndPatch(retries = 20, interval = 300) {
        let attempts = 0;
        const id = setInterval(() => {
          attempts++;
          const ok = patchButtons();
          if (ok || attempts >= retries) {
            clearInterval(id);
          }
        }, interval);
      }

      if (document.readyState === 'interactive' || document.readyState === 'complete') {
        waitAndPatch();
      } else {
        document.addEventListener('DOMContentLoaded', function () { waitAndPatch(); });
      }

      // Also observe #api for late DOM inserts and attempt patch again
      (function observeApi() {
        const root = document.getElementById('api');
        if (!root) {
          setTimeout(observeApi, 300);
          return;
        }
        const mo = new MutationObserver(() => { patchButtons(); });
        mo.observe(root, { childList: true, subtree: true });
      })();

    })();
  </script>
</body>
</html>
