<!DOCTYPE html>
<html>
<head>
    <title>Sign up or sign in</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css" />

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: url('https://login.microsoftonline.com/templates/src/backgrounds/1-1.png') no-repeat center center fixed;
            background-size: cover;
        }

        .panel {
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 420px;
            margin: auto;
            margin-top: 8vh;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .companyLogo {
            display: block;
            margin: 0 auto 30px auto;
            max-height: 90px;
        }

        /* ===== IDP BUTTON BASE STYLE ===== */
        #GoogleExchange,
        #MicrosoftAccountExchange,
        #LinkedInExchange,
        button[id*="Google"],
        button[id*="Microsoft"],
        button[id*="LinkedIn"],
        .accountButton[id*="Google"],
        .accountButton[id*="Microsoft"],
        .accountButton[id*="LinkedIn"] {
            display: block !important;
            width: 100% !important;
            max-width: 380px !important;
            height: 48px !important;
            line-height: 48px !important;
            margin: 12px auto !important;
            border-radius: 8px !important;
            border: 1px solid #ccc !important;
            background-color: #ffffff !important;
            font-size: 16px !important;
            text-align: left !important;
            padding-left: 50px !important;
            background-repeat: no-repeat !important;
            background-position: 15px center !important;
            background-size: 20px 20px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
            transition: all 0.2s ease-in-out;
        }

        /* ===== ICONS ===== */
        #GoogleExchange,
        button[id*="Google"],
        .accountButton[id*="Google"] {
            background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/google.svg') !important;
        }

        #MicrosoftAccountExchange,
        button[id*="Microsoft"],
        .accountButton[id*="Microsoft"] {
            background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/microsoft.svg') !important;
        }

        #LinkedInExchange,
        button[id*="LinkedIn"],
        .accountButton[id*="LinkedIn"] {
            background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/colored/linkedin.svg') !important;
        }

        /* ===== HOVER EFFECT ===== */
        #GoogleExchange:hover,
        #MicrosoftAccountExchange:hover,
        #LinkedInExchange:hover,
        button[id*="Google"]:hover,
        button[id*="Microsoft"]:hover,
        button[id*="LinkedIn"]:hover {
            background-color: #1662c7 !important;
            color: white !important;
        }

        #GoogleExchange:hover {
            background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/google.svg') !important;
        }

        #MicrosoftAccountExchange:hover {
            background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/microsoft.svg') !important;
        }

        #LinkedInExchange:hover {
            background-image: url('https://login.microsoftonline.com/templates/src/idp_logos/white/linkedin.svg') !important;
        }

        /* Ensure API content centers properly */
        #api {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="panel panel-default">

                <!-- Top Logo -->
                <img class="companyLogo"
                     src="https://login.microsoftonline.com/templates/src/images/logo.svg"
                     alt="Company Logo">

                <!-- REQUIRED: Azure injects UI here -->
                <div id="api"></div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
